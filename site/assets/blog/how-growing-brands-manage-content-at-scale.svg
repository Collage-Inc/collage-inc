<svg width="1120" height="560" viewBox="0 0 1120 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1f4e"/>
      <stop offset="55%" stop-color="#2d1f6e"/>
      <stop offset="100%" stop-color="#0f3550"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6473FF"/>
      <stop offset="100%" stop-color="#8B6CF6"/>
    </linearGradient>
    <linearGradient id="grad-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#40E0D0"/>
      <stop offset="100%" stop-color="#6473FF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="grad-coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7F50"/>
      <stop offset="100%" stop-color="#FF5572"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1120" height="560" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#B6B6F2" stroke-width="1">
    <line x1="0" y1="112" x2="1120" y2="112"/>
    <line x1="0" y1="224" x2="1120" y2="224"/>
    <line x1="0" y1="336" x2="1120" y2="336"/>
    <line x1="0" y1="448" x2="1120" y2="448"/>
    <line x1="186" y1="0" x2="186" y2="560"/>
    <line x1="373" y1="0" x2="373" y2="560"/>
    <line x1="560" y1="0" x2="560" y2="560"/>
    <line x1="747" y1="0" x2="747" y2="560"/>
    <line x1="934" y1="0" x2="934" y2="560"/>
  </g>

  <!-- Large parallelogram shape (Risorsa 9c style) — left -->
  <path d="M-20 420 L260 110 L340 110 L60 420 Z" fill="#6473FF" opacity="0.18"/>

  <!-- Triangle shape (Risorsa 11c style) — top right area -->
  <path d="M820 0 L820 180 L1000 0 Z" fill="#40E0D0" opacity="0.15"/>

  <!-- Rounded square (Risorsa 13c style) — right -->
  <rect x="960" y="340" width="120" height="120" rx="12" fill="#FF7F50" opacity="0.12" transform="rotate(18 1020 400)"/>

  <!-- Tall shape (Risorsa 14c style) — far right -->
  <path d="M1080 80 L1080 380 Q1080 420 1060 440 L1000 520 L1000 120 Q1000 80 1040 80 Z" fill="#B6B6F2" opacity="0.1"/>

  <!-- Content blocks — visual metaphor for organized assets -->
  <!-- Row 1 -->
  <rect x="280" y="148" width="180" height="110" rx="10" fill="#6473FF" opacity="0.25"/>
  <rect x="280" y="148" width="180" height="110" rx="10" stroke="#6473FF" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="480" y="148" width="120" height="110" rx="10" fill="#40E0D0" opacity="0.2"/>
  <rect x="480" y="148" width="120" height="110" rx="10" stroke="#40E0D0" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="620" y="148" width="200" height="110" rx="10" fill="#8B6CF6" opacity="0.2"/>
  <rect x="620" y="148" width="200" height="110" rx="10" stroke="#8B6CF6" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="840" y="148" width="100" height="110" rx="10" fill="#FF7F50" opacity="0.15"/>
  <rect x="840" y="148" width="100" height="110" rx="10" stroke="#FF7F50" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Row 2 -->
  <rect x="280" y="280" width="120" height="90" rx="10" fill="#40E0D0" opacity="0.18"/>
  <rect x="280" y="280" width="120" height="90" rx="10" stroke="#40E0D0" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="420" y="280" width="200" height="90" rx="10" fill="#6473FF" opacity="0.2"/>
  <rect x="420" y="280" width="200" height="90" rx="10" stroke="#6473FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="640" y="280" width="140" height="90" rx="10" fill="#B6B6F2" opacity="0.18"/>
  <rect x="640" y="280" width="140" height="90" rx="10" stroke="#B6B6F2" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="800" y="280" width="140" height="90" rx="10" fill="#8B6CF6" opacity="0.15"/>
  <rect x="800" y="280" width="140" height="90" rx="10" stroke="#8B6CF6" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Row 3 — partial, fading out -->
  <rect x="280" y="392" width="160" height="70" rx="10" fill="#FF7F50" opacity="0.12"/>
  <rect x="280" y="392" width="160" height="70" rx="10" stroke="#FF7F50" stroke-width="1.5" stroke-opacity="0.25"/>
  <rect x="460" y="392" width="240" height="70" rx="10" fill="#6473FF" opacity="0.1"/>
  <rect x="460" y="392" width="240" height="70" rx="10" stroke="#6473FF" stroke-width="1.5" stroke-opacity="0.2"/>
  <rect x="720" y="392" width="100" height="70" rx="10" fill="#40E0D0" opacity="0.08"/>
  <rect x="720" y="392" width="100" height="70" rx="10" stroke="#40E0D0" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Icon/label marks inside blocks -->
  <rect x="300" y="172" width="60" height="8" rx="4" fill="white" opacity="0.35"/>
  <rect x="300" y="188" width="100" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="300" y="202" width="80" height="6" rx="3" fill="white" opacity="0.2"/>

  <rect x="500" y="172" width="40" height="8" rx="4" fill="white" opacity="0.3"/>
  <rect x="500" y="188" width="70" height="6" rx="3" fill="white" opacity="0.18"/>

  <rect x="640" y="172" width="70" height="8" rx="4" fill="white" opacity="0.3"/>
  <rect x="640" y="188" width="120" height="6" rx="3" fill="white" opacity="0.18"/>
  <rect x="640" y="202" width="90" height="6" rx="3" fill="white" opacity="0.18"/>

  <!-- Glow on first block -->
  <rect x="280" y="148" width="180" height="110" rx="10" fill="url(#grad-blue)" opacity="0.15"/>

  <!-- Teal accent dot top left of block grid -->
  <circle cx="268" cy="148" r="5" fill="#40E0D0" opacity="0.7"/>
  <circle cx="268" cy="280" r="5" fill="#40E0D0" opacity="0.5"/>
  <circle cx="268" cy="392" r="5" fill="#40E0D0" opacity="0.3"/>

  <!-- Left vertical connecting line -->
  <line x1="268" y1="148" x2="268" y2="462" stroke="#40E0D0" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="4 4"/>

  <!-- Branding glow blob center-left -->
  <ellipse cx="200" cy="280" rx="140" ry="180" fill="#6473FF" opacity="0.07"/>
</svg>
